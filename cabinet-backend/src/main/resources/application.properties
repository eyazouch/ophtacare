# =============================================
# Configuration Base de Données MySQL
# =============================================
# dans Docker Compose, MySQL tourne dans un container
#spring.datasource.url=jdbc:mysql://mysql:3306/cabinet_ophtalmo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# Configuration JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# Configuration Serveur
# =============================================
server.port=8081

# =============================================
# Configuration JWT
# =============================================
# app.jwt.secret=w/7bvp8hNKKsPbJcJEHYRx//2TTRixHdQx2otjb3VP5JYfBHwTgVWIfduODBkObPNcf82ZrUMLvlDis+wVsFew==
# app.jwt.expiration=86400000
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION}

# =============================================
# Configuration Upload Fichiers
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/analyses

# =============================================
# Configuration Email (Gmail exemple)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=Votre_email
spring.mail.password=mdp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

